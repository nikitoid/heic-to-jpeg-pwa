<html lang="ru">
  <head>

    />

    <style>
      /* Дополнительные стили для плавных переходов и улучшения UX */
      .fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* Стиль для кастомной кнопки загрузки */
      .file-input-button {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body class="bg-gray-100 font-sans antialiased">
    <div
      class="container mx-auto p-4 sm:p-6 md:p-8 max-w-4xl min-h-screen flex flex-col"
    >
      <!-- Заголовок -->
      <header class="mb-8 text-center">
        <h1 class="text-4xl sm:text-5xl font-bold text-teal-800">
          Конвертер HEIC в JPEG
        </h1>
        <p class="text-gray-600 mt-2">
          Быстро, бесплатно и безопасно. Вся обработка на вашем устройстве.
        </p>
      </header>

      <!-- Область загрузки файлов -->
      <main
        class="flex-grow flex flex-col items-center justify-center bg-white p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-200"
      >
        <div
          id="drop-zone"
          class="w-full text-center border-4 border-dashed border-gray-300 rounded-xl p-8 sm:p-12 transition-colors duration-300 ease-in-out"
        >
          <input
            type="file"
            id="file-input"
            accept=".heic,.heif"
            multiple
            class="hidden"
          />

          <label
            for="file-input"
            class="file-input-button bg-teal-600 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-teal-700 transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              />
            </svg>
            Выберите HEIC файлы
          </label>
          <p class="text-gray-500 mt-4 text-sm">или перетащите их сюда</p>
        </div>

        <!-- Статус и индикатор загрузки -->
        <div
          id="status"
          class="w-full mt-6 text-center text-gray-700 font-medium"
        ></div>
      </main>

      <!-- Область с результатами -->
      <section
        id="results"
        class="mt-8 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
      >
        <!-- Сюда будут добавляться сконвертированные изображения -->
      </section>

      <!-- Подвал -->
      <footer class="text-center text-gray-500 text-sm mt-8 pb-4">
        <p>&copy; 2024 PWA HEIC Converter. Все права защищены.</p>
      </footer>
    </div>

    <script>
      // --- РЕГИСТРАЦИЯ SERVICE WORKER для PWA ---
      // Это позволяет приложению работать оффлайн

      const swCode = `
            const CACHE_NAME = 'heic-converter-cache-v1';
            const HEIC2ANY_URL = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
            const TAILWIND_URL = 'https://cdn.tailwindcss.com';
            
            // Список ресурсов для кэширования при установке
            const urlsToCache = [
                '/',
                HEIC2ANY_URL,
                TAILWIND_URL
            ];

            // Событие 'install': кэширование основных ресурсов приложения
            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME)
                        .then(cache => {
                            console.log('Кэш открыт');
                            // Важно: используем 'no-cors' для CDN ресурсов, чтобы избежать ошибок
                            const cachePromises = urlsToCache.map(urlToCache => {
                                const request = new Request(urlToCache, { mode: 'no-cors' });
                                return fetch(request).then(response => cache.put(urlToCache, response));
                            });
                            return Promise.all(cachePromises);
                        })
                );
            });

            // Событие 'fetch': перехват запросов и отдача из кэша, если возможно
            self.addEventListener('fetch', event => {
                event.respondWith(
                    caches.match(event.request)
                        .then(response => {
                            // Если ресурс есть в кэше, отдаем его
                            if (response) {
                                return response;
                            }
                            // Иначе, делаем запрос к сети
                            return fetch(event.request);
                        })
                );
            });
        `;

      if ("serviceWorker" in navigator) {
        // Создаем Service Worker из строки кода, чтобы все было в одном файле
        const swBlob = new Blob([swCode], { type: "application/javascript" });
        const swUrl = URL.createObjectURL(swBlob);

        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register(swUrl)
            .then((registration) => {
              console.log(
                "ServiceWorker зарегистрирован: ",
                registration.scope
              );
            })
            .catch((error) => {
              console.log("Ошибка регистрации ServiceWorker: ", error);
            });
        });
      }

      // --- ЛОГИКА ПРИЛОЖЕНИЯ ---

      const fileInput = document.getElementById("file-input");
      const dropZone = document.getElementById("drop-zone");
      const statusDiv = document.getElementById("status");
      const resultsDiv = document.getElementById("results");

      // Обработчики для Drag & Drop
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.add("border-teal-500", "bg-teal-50"),
          false
        );
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropZone.addEventListener(
          eventName,
          () => dropZone.classList.remove("border-teal-500", "bg-teal-50"),
          false
        );
      });

      dropZone.addEventListener("drop", handleDrop, false);
      fileInput.addEventListener("change", handleFileSelect);

      function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
      }

      function handleFileSelect(e) {
        handleFiles(e.target.files);
      }

      async function handleFiles(files) {
        if (files.length === 0) {
          return;
        }
        // Очищаем предыдущие результаты и статус
        resultsDiv.innerHTML = "";
        statusDiv.innerHTML = `
                <div class="flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-teal-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Обработка ${files.length} файлов...</span>
                </div>`;

        let convertedCount = 0;
        const conversionPromises = [];

        for (const file of files) {
          // Пропускаем не-HEIC файлы
          if (
            !file.type.includes("heic") &&
            !file.type.includes("heif") &&
            !/\.(heic|heif)$/i.test(file.name)
          ) {
            console.warn(`Пропущен файл: ${file.name} (не HEIC/HEIF)`);
            continue;
          }

          const promise = convertFile(file).then((resultCard) => {
            if (resultCard) {
              resultsDiv.appendChild(resultCard);
              convertedCount++;
            }
          });
          conversionPromises.push(promise);
        }

        // Ждем завершения всех конвертаций
        await Promise.all(conversionPromises);

        // Обновляем статус после завершения
        if (convertedCount > 0) {
          statusDiv.textContent = `Готово! Успешно сконвертировано ${convertedCount} из ${files.length} файлов.`;
        } else {
          statusDiv.textContent =
            "Не найдено HEIC/HEIF файлов для конвертации.";
        }
      }

      async function convertFile(file) {
        try {
          const conversionResult = await heic2any({
            blob: file,
            toType: "image/jpeg",
            quality: 0.9, // Качество JPEG от 0 до 1
          });

          const url = URL.createObjectURL(conversionResult);
          const newFileName = file.name.replace(/\.(heic|heif)$/i, ".jpeg");

          // Создаем карточку с результатом
          const card = document.createElement("div");
          card.className =
            "bg-white rounded-lg shadow-md overflow-hidden fade-in border border-gray-200";

          card.innerHTML = `
                    <img src="${url}" alt="Сконвертированное изображение" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <p class="text-sm font-medium text-gray-800 truncate" title="${newFileName}">${newFileName}</p>
                        <a href="${url}" download="${newFileName}" class="mt-3 inline-block w-full text-center bg-teal-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-teal-700 transition-colors">
                            Скачать
                        </a>
                    </div>
                `;
          return card;
        } catch (error) {
          console.error(`Ошибка конвертации файла ${file.name}:`, error);
          // Создаем карточку с ошибкой
          const errorCard = document.createElement("div");
          errorCard.className =
            "bg-red-50 rounded-lg p-4 fade-in border border-red-200";
          errorCard.innerHTML = `
                    <p class="text-sm font-bold text-red-700 truncate">${file.name}</p>
                    <p class="text-xs text-red-600 mt-1">Не удалось сконвертировать.</p>
                `;
          return errorCard;
        }
      }
    </script>
  </body>
</html>
